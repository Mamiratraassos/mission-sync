<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080c14">
<title>Mission Sync</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#080c14;color:#ede9e0;overflow:hidden;height:100dvh}
#root{height:100dvh}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
textarea::placeholder,input::placeholder{color:#3e3b34}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback}=React;

// ═══ TWO REPORT TEMPLATES ═══
const TEMPLATES={
  visite:[
    {key:"contexte",label:"Contexte de la mission",icon:"📋",num:"I"},
    {key:"objectifs",label:"Objectifs",icon:"🎯",num:"II"},
    {key:"activites",label:"Activités réalisées",icon:"⚙️",num:"III"},
    {key:"observations",label:"Observations & Constats",icon:"👁️",num:"IV"},
    {key:"resultats",label:"Résultats obtenus",icon:"📊",num:"V"},
    {key:"recommandations",label:"Recommandations",icon:"💡",num:"VI"},
    {key:"prochaines_etapes",label:"Prochaines étapes",icon:"➡️",num:"VII"},
    {key:"divers",label:"Notes diverses",icon:"📝",num:"VIII"},
  ],
  hebdo:[
    {key:"contexte_general",label:"Contexte général",icon:"🌍",num:"1.1"},
    {key:"contexte_regional",label:"Contexte régional / Sécurité",icon:"📍",num:"1.2"},
    {key:"med_epidemio",label:"MED — Données épidémiologiques",icon:"🦠",num:"2.1"},
    {key:"med_projets",label:"MED — Projets médicaux",icon:"🏥",num:"2.2"},
    {key:"ops_projet1",label:"OPS — Projet 1",icon:"⚙️",num:"3.1"},
    {key:"ops_projet2",label:"OPS — Projet 2",icon:"⚙️",num:"3.2"},
    {key:"ops_projet3",label:"OPS — Projet 3",icon:"⚙️",num:"3.3"},
    {key:"actions_cles",label:"Actions clés semaine prochaine",icon:"✅",num:"4"},
    {key:"divers",label:"Divers / Notes",icon:"📝",num:"5"},
  ],
};
const TEMPLATE_LABELS={visite:"Rapport de visite",hebdo:"Update hebdomadaire"};

function getSections(type){return TEMPLATES[type]||TEMPLATES.visite}
function emptyReport(type){return Object.fromEntries(getSections(type).map(s=>[s.key,""]))}

const C={bg:"#080c14",srf:"#101828",srfAlt:"#182035",gold:"#d4a44a",goldL:"#ebd08a",goldD:"rgba(212,164,74,0.10)",txt:"#ede9e0",txtD:"#8a8678",txtM:"#3e3b34",grn:"#22c55e",grnD:"rgba(34,197,94,0.12)",red:"#ef4444",org:"#f59e0b",orgD:"rgba(245,158,11,0.12)",brd:"rgba(255,255,255,0.05)",brdG:"rgba(212,164,74,0.13)"};
const UC={A:{bg:"linear-gradient(135deg,#1e3a5f,#152640)",ac:"#5b9bd5"},B:{bg:"linear-gradient(135deg,#2d1f4e,#1c1340)",ac:"#a78bfa"}};

// ═══ Firebase ═══
let db=null;
async function initFB(){if(db)return db;try{const r=await fetch("/api/config");const c=await r.json();if(!c.apiKey)return null;firebase.initializeApp(c);db=firebase.database();return db}catch{return null}}
async function dbGet(p){const d=await initFB();if(!d)return null;try{const s=await d.ref(p).get();return s.exists()?s.val():null}catch{return null}}
async function dbSet(p,v){const d=await initFB();if(!d)return;try{await d.ref(p).set(v)}catch{}}
async function dbDel(p){const d=await initFB();if(!d)return;try{await d.ref(p).remove()}catch{}}
function dbOn(p,cb){initFB().then(d=>{if(d)d.ref(p).on("value",s=>{cb(s.exists()?s.val():null)})});return()=>{initFB().then(d=>{if(d)d.ref(p).off("value")})}}

// ═══ AI ═══
async function callAI(text,report,config,sections){
  const filled=sections.filter(s=>report[s.key]).map(s=>s.key).join(",");
  const sectionKeys=sections.map(s=>s.key).join("|");
  const r=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text,title:config.title,location:config.location,filled,sectionKeys})});
  if(!r.ok)throw new Error("AI failed: "+r.status);
  return await r.json();
}

// ═══ Export Word ═══
function ExportBtn({config,report,type}){
  const[url,setUrl]=useState(null);const[fname,setFname]=useState("");
  const sections=getSections(type);const filled=sections.filter(s=>report[s.key]);
  const generate=()=>{
    if(!filled.length)return;
    const today=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
    const mDate=new Date(config.date).toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
    const e=t=>(t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const isHebdo=type==="hebdo";
    const headerTitle=isHebdo?"UPDATE HEBDOMADAIRE":"RAPPORT DE MISSION";
    const headerSub=isHebdo?e(config.title)+" | Semaine du "+mDate:e(config.title);
    let body="";
    sections.forEach(s=>{if(!report[s.key])return;const ps=report[s.key].split("\n").filter(p=>p.trim()).map(p=>"<p style='font-size:11pt;line-height:1.7;color:#333;margin:4pt 0 8pt;text-align:justify'>"+e(p)+"</p>").join("");body+="<h2 style='font-size:13pt;color:#1a3a5c;font-family:Calibri;border-bottom:2pt solid "+(isHebdo?"#c0392b":"#c4922e")+";padding-bottom:4pt;margin-top:20pt;text-transform:uppercase'>"+s.num+". "+e(s.label)+"</h2>"+ps});
    const accentColor=isHebdo?"#c0392b":"#c4922e";
    const html="<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'><head><meta charset='utf-8'><style>@page{size:A4;margin:2.5cm 2cm}body{font-family:Calibri,sans-serif;font-size:11pt;color:#2c2c2c}table.t{width:100%;border-collapse:collapse;margin:10pt 0 16pt}table.t td{border:0.5pt solid #bbb;padding:6pt 10pt;font-size:10pt}table.t td.l{background:#e8e0d0;font-weight:bold;width:35%;color:#1a3a5c}</style></head><body><div style='background:#1a3a5c;padding:20pt 24pt;margin:-10pt -5pt 16pt -5pt'><p style='font-size:22pt;color:white;font-weight:bold;margin:0'>"+headerTitle+"</p><p style='font-size:11pt;color:"+accentColor+";margin:4pt 0 0;text-transform:uppercase'>"+headerSub+"</p></div><table class='t'><tr><td class='l'>"+TEMPLATE_LABELS[type]+"</td><td>"+e(config.title)+"</td></tr><tr><td class='l'>Date</td><td>"+mDate+"</td></tr><tr><td class='l'>Lieu</td><td>"+e(config.location||"\u2014")+"</td></tr><tr><td class='l'>Rapport</td><td>"+today+"</td></tr></table><hr style='border:none;border-top:2pt solid "+accentColor+";margin:14pt 0'>"+body+"</body></html>";
    const b64=btoa(unescape(encodeURIComponent(html)));
    setUrl("data:application/msword;base64,"+b64);
    const prefix=isHebdo?"Hebdo":"Rapport";
    setFname(prefix+"-"+(config.title||"mission").replace(/[^a-zA-Z0-9\u00C0-\u024F ]/g,"").replace(/\s+/g,"-")+".doc");
  };
  if(!filled.length)return null;
  return(<div style={{textAlign:"center",marginTop:14,marginBottom:14}}>
    {!url?<button onClick={generate} style={{padding:"12px 24px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",minWidth:220}}>{"📝 Préparer le "+TEMPLATE_LABELS[type]}</button>
    :<div style={{animation:"fadeUp .3s ease"}}>
      <a href={url} download={fname} style={{display:"inline-block",padding:"14px 28px",borderRadius:10,background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",fontSize:13,fontWeight:700,textDecoration:"none"}}>{"⬇ "+fname}</a>
      <div style={{marginTop:8}}><button onClick={()=>{setUrl(null);setTimeout(generate,100)}} style={{padding:"7px 14px",borderRadius:8,border:"1px solid "+C.brd,background:"rgba(255,255,255,0.03)",color:C.txtD,fontSize:11,cursor:"pointer"}}>{"🔄 Regénérer"}</button></div>
    </div>}
  </div>);
}

// ═══ Word Preview ═══
function WordPreview({config,report,messages,type}){
  const sections=getSections(type);const filled=sections.filter(s=>report[s.key]);
  const today=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  const mDate=new Date(config.date).toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  const isHebdo=type==="hebdo";const accent=isHebdo?"#c0392b":"#c4922e";
  return(<div style={{padding:12,minHeight:"100%"}}>
    <div style={{background:"#fff",borderRadius:4,maxWidth:460,margin:"0 auto",boxShadow:"0 2px 20px rgba(0,0,0,0.4)",color:"#1a1a1a",fontFamily:"Cambria,Georgia,serif",fontSize:11,lineHeight:1.55,overflow:"hidden"}}>
      <div style={{background:"linear-gradient(135deg,#1a3a5c,#15304d)",padding:"18px 24px 14px"}}>
        <div style={{fontSize:9,letterSpacing:3,textTransform:"uppercase",color:"rgba(255,255,255,0.5)",fontFamily:"Calibri,sans-serif",marginBottom:6}}>{isHebdo?"Update hebdomadaire":"Rapport de mission"}</div>
        <div style={{fontSize:19,fontWeight:700,color:"#fff",fontFamily:"Calibri,sans-serif"}}>{config.title}</div>
        {isHebdo&&<div style={{fontSize:11,color:"rgba(255,255,255,0.6)",marginTop:4,fontFamily:"Calibri,sans-serif"}}>{"Semaine du "+mDate}</div>}
        <div style={{marginTop:6,height:2.5,width:60,background:"linear-gradient(90deg,"+accent+","+C.goldL+")",borderRadius:2}}/>
      </div>
      <div style={{padding:"20px 24px 24px"}}>
        <table style={{width:"100%",borderCollapse:"collapse",marginBottom:18,fontSize:10}}><tbody>
          {[[TEMPLATE_LABELS[type],config.title],["Date",mDate],["Lieu",config.location||"—"],["Rapport",today],["Notes",String(messages.length)]].map(([l,v],i)=><tr key={i}><td style={{padding:"6px 10px",width:"38%",background:i%2===0?"#f0ebe0":"#f7f3ec",fontWeight:600,color:"#1a3a5c",borderBottom:"1px solid #e0dbd0",fontFamily:"Calibri,sans-serif",fontSize:9.5}}>{l}</td><td style={{padding:"6px 10px",background:i%2===0?"#fafaf7":"#fff",borderBottom:"1px solid #e8e4dc",color:"#333",fontSize:10}}>{v}</td></tr>)}
        </tbody></table>
        <div style={{height:2,background:"linear-gradient(90deg,"+accent+","+C.goldL+","+accent+")",margin:"4px 0 18px"}}/>
        {filled.length===0?<div style={{textAlign:"center",padding:"40px 20px",color:"#bbb",fontStyle:"italic"}}>Le rapport est vide.</div>
        :filled.map((s,idx)=><div key={s.key} style={{marginBottom:idx<filled.length-1?16:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,paddingBottom:5,marginBottom:8,borderBottom:"2px solid "+accent}}><span style={{fontSize:12,fontWeight:700,color:"#1a3a5c",fontFamily:"Calibri,sans-serif"}}>{s.num}.</span><span style={{fontSize:12,fontWeight:700,color:"#1a3a5c",textTransform:"uppercase",fontFamily:"Calibri,sans-serif"}}>{s.label}</span></div>
          {report[s.key].split("\n").filter(p=>p.trim()).map((p,pi)=><p key={pi} style={{margin:"0 0 7px",textAlign:"justify",color:"#2c2c2c",fontSize:10.5,lineHeight:1.65,textIndent:pi>0?20:0}}>{p}</p>)}
        </div>)}
        {filled.length>0&&<div style={{borderTop:"1px solid #e0dbd0",marginTop:20,paddingTop:10,display:"flex",justifyContent:"space-between",fontSize:8,color:"#aaa",fontStyle:"italic"}}><span>MissionSync</span><span>Page 1/1</span></div>}
      </div>
    </div>
    <ExportBtn config={config} report={report} type={type}/>
  </div>);
}

// ═══ Editable Section ═══
function EditSec({sec,content,onSave}){
  const[ed,setEd]=useState(false);const[dr,setDr]=useState(content);const r=useRef(null);
  useEffect(()=>{setDr(content)},[content]);
  useEffect(()=>{if(ed&&r.current){r.current.focus();r.current.style.height="auto";r.current.style.height=r.current.scrollHeight+"px"}},[ed]);
  return(<div style={{marginBottom:8,background:content?"rgba(255,255,255,0.02)":"rgba(255,255,255,0.006)",border:ed?"1px solid "+C.gold:content?"1px solid "+C.brdG:"1px dashed "+C.brd,borderRadius:11,padding:"11px 13px"}}>
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:content||ed?7:0}}>
      <span style={{fontSize:14}}>{sec.icon}</span><span style={{fontSize:12,fontWeight:600,color:content||ed?C.txt:C.txtM}}>{sec.label}</span>
      <div style={{marginLeft:"auto",display:"flex",gap:4}}>
        {ed?<><button onClick={()=>{onSave(sec.key,dr);setEd(false)}} style={{background:C.grnD,border:"1px solid rgba(34,197,94,0.25)",borderRadius:7,color:C.grn,fontSize:10,fontWeight:600,padding:"3px 10px",cursor:"pointer"}}>✓</button><button onClick={()=>{setDr(content);setEd(false)}} style={{background:"rgba(255,255,255,0.03)",border:"1px solid "+C.brd,borderRadius:7,color:C.txtD,fontSize:10,padding:"3px 10px",cursor:"pointer"}}>✕</button></>
        :<button onClick={()=>setEd(true)} style={{background:"rgba(255,255,255,0.03)",border:"1px solid "+C.brd,borderRadius:7,color:C.txtD,fontSize:10,padding:"3px 8px",cursor:"pointer"}}>✏️</button>}
      </div>
    </div>
    {ed?<textarea ref={r} value={dr} onChange={ev=>{setDr(ev.target.value);ev.target.style.height="auto";ev.target.style.height=ev.target.scrollHeight+"px"}} placeholder={"Saisir "+sec.label} style={{width:"100%",boxSizing:"border-box",minHeight:60,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(212,164,74,0.2)",borderRadius:8,padding:"9px 11px",color:C.txt,fontSize:12.5,outline:"none",lineHeight:1.6,resize:"none"}}/>
    :content?<div onClick={()=>setEd(true)} style={{fontSize:12.5,lineHeight:1.7,color:"#b0a99e",whiteSpace:"pre-line",paddingLeft:20,cursor:"pointer"}}>{content}</div>:null}
  </div>);
}

// ═══ Login ═══
function Login({onLogin}){
  const[nm,setNm]=useState("");const[step,setSt]=useState("name");
  return(<div style={{height:"100dvh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"radial-gradient(ellipse at 25% 15%,rgba(212,164,74,0.05),#080c14 65%)",padding:28}}>
    <div style={{fontSize:44,marginBottom:8}}>📡</div>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:800,marginBottom:3}}>Mission Sync</div>
    <div style={{fontSize:11,color:C.txtD,letterSpacing:3,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginBottom:36}}>Notes · IA · Rapport</div>
    {step==="name"?<div style={{width:"100%",maxWidth:310}}>
      <input value={nm} onChange={ev=>setNm(ev.target.value)} placeholder="Votre nom..." autoFocus onKeyDown={ev=>{if(ev.key==="Enter"&&nm.trim())setSt("role")}} style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.04)",border:"1px solid "+C.brdG,borderRadius:14,padding:"13px 16px",color:C.txt,fontSize:15,outline:"none",textAlign:"center",marginBottom:14}}/>
      <button disabled={!nm.trim()} onClick={()=>setSt("role")} style={{width:"100%",padding:"13px 0",borderRadius:14,border:"none",background:nm.trim()?"linear-gradient(135deg,"+C.gold+",#c4922e)":"rgba(255,255,255,0.03)",color:nm.trim()?C.bg:C.txtM,fontSize:14,fontWeight:700,cursor:nm.trim()?"pointer":"default"}}>Continuer</button>
    </div>
    :<div style={{width:"100%",maxWidth:310}}>
      <div style={{fontSize:13,color:C.txtD,textAlign:"center",marginBottom:16}}>Bienvenue <strong style={{color:C.gold}}>{nm}</strong></div>
      {[{role:"A",lb:"Téléphone A",ds:"Chef de mission"},{role:"B",lb:"Téléphone B",ds:"Agent de terrain"}].map(o=><button key={o.role} onClick={()=>onLogin(nm.trim(),o.role)} style={{width:"100%",padding:"16px 18px",marginBottom:10,background:C.srfAlt,border:"1px solid "+C.brdG,borderRadius:14,color:C.txt,textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:42,height:42,borderRadius:12,background:UC[o.role].bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:UC[o.role].ac}}>{o.role}</div>
        <div><div style={{fontSize:14,fontWeight:600}}>{o.lb}</div><div style={{fontSize:11,color:C.txtD,marginTop:1}}>{o.ds}</div></div>
      </button>)}
    </div>}
  </div>);
}

// ═══ Missions List ═══
function MissionsList({user,onSelect,onLogout}){
  const[missions,setMissions]=useState([]);const[loading,setLoading]=useState(true);
  const[showNew,setShowNew]=useState(false);const[newT,setNewT]=useState("");const[newL,setNewL]=useState("");const[newD,setNewD]=useState(new Date().toISOString().slice(0,10));
  const[newType,setNewType]=useState("visite");

  useEffect(()=>{const u=dbOn("missions",data=>{if(!data){setMissions([]);setLoading(false);return}const list=Object.entries(data).map(([id,d])=>({id,...d})).sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));setMissions(list);setLoading(false)});return u},[]);

  const create=async()=>{if(!newT.trim())return;const id=Date.now().toString(36)+Math.random().toString(36).slice(2,5);await dbSet("missions/"+id,{config:{title:newT.trim(),location:newL.trim(),date:newD,type:newType},createdAt:Date.now(),updatedAt:Date.now(),msgCount:0});onSelect(id)};
  const del=async(id,ev)=>{ev.stopPropagation();if(!confirm("Supprimer cette mission ?"))return;await dbDel("missions/"+id);await dbDel("messages/"+id);await dbDel("reports/"+id)};

  return(<div style={{height:"100dvh",display:"flex",flexDirection:"column",background:C.bg,color:C.txt,overflow:"hidden",maxWidth:480,margin:"0 auto",width:"100%"}}>
    <div style={{background:"linear-gradient(135deg,"+C.srf+",#0f1729)",borderBottom:"1px solid "+C.brdG,padding:"16px 16px 14px",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:9,letterSpacing:3,color:C.gold,textTransform:"uppercase",fontFamily:"'JetBrains Mono',monospace",marginBottom:3}}>Mission Sync</div><div style={{fontSize:18,fontWeight:700}}>Mes Missions</div><div style={{fontSize:11,color:C.txtD,marginTop:2}}>{user.name+" · "+missions.length+" mission(s)"}</div></div>
        <button onClick={onLogout} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:9,color:C.red,width:34,height:34,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>⏻</button>
      </div>
    </div>
    <div style={{flex:1,overflow:"auto",padding:"12px 14px"}}>
      {showNew?<div style={{background:C.srfAlt,border:"1px solid "+C.gold,borderRadius:14,padding:16,marginBottom:14,animation:"slideDown .25s ease"}}>
        <div style={{fontSize:13,fontWeight:700,color:C.gold,marginBottom:12}}>Nouvelle mission</div>

        {/* Type selector */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:9,fontWeight:600,color:C.txtD,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:6}}>Type de rapport</label>
          <div style={{display:"flex",gap:8}}>
            {[{t:"visite",lb:"📋 Rapport de visite",ds:"Visite terrain, audit, inspection"},{t:"hebdo",lb:"📊 Update hebdo",ds:"Mise à jour hebdomadaire MSF"}].map(o=><button key={o.t} onClick={()=>setNewType(o.t)} style={{flex:1,padding:"12px 10px",borderRadius:10,border:newType===o.t?"2px solid "+C.gold:"1px solid "+C.brd,background:newType===o.t?C.goldD:"rgba(255,255,255,0.02)",color:newType===o.t?C.gold:C.txtD,cursor:"pointer",textAlign:"left"}}>
              <div style={{fontSize:12,fontWeight:600}}>{o.lb}</div>
              <div style={{fontSize:10,marginTop:3,color:C.txtM}}>{o.ds}</div>
            </button>)}
          </div>
        </div>

        {[{l:"Titre *",v:newT,s:setNewT,p:newType==="hebdo"?"Ex: MSF Madagascar S10":"Ex: Audit Région Nord"},{l:"Lieu",v:newL,s:setNewL,p:"Ex: Antananarivo"},{l:"Date",v:newD,s:setNewD,t:"date"}].map((f,i)=><div key={i} style={{marginBottom:10}}><label style={{fontSize:9,fontWeight:600,color:C.txtD,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:3}}>{f.l}</label><input type={f.t||"text"} value={f.v} onChange={ev=>f.s(ev.target.value)} placeholder={f.p} style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.04)",border:"1px solid "+C.brdG,borderRadius:8,padding:"9px 12px",color:C.txt,fontSize:13,outline:"none"}}/></div>)}
        <div style={{display:"flex",gap:8}}><button onClick={create} disabled={!newT.trim()} style={{flex:1,padding:"11px 0",borderRadius:10,border:"none",background:newT.trim()?"linear-gradient(135deg,"+C.gold+",#c4922e)":"rgba(255,255,255,0.03)",color:newT.trim()?C.bg:C.txtM,fontSize:13,fontWeight:700,cursor:newT.trim()?"pointer":"default"}}>Créer</button><button onClick={()=>setShowNew(false)} style={{padding:"11px 18px",borderRadius:10,border:"1px solid "+C.brd,background:"rgba(255,255,255,0.03)",color:C.txtD,fontSize:13,cursor:"pointer"}}>Annuler</button></div>
      </div>
      :<button onClick={()=>setShowNew(true)} style={{width:"100%",padding:14,marginBottom:14,borderRadius:12,border:"2px dashed "+C.brdG,background:"rgba(212,164,74,0.04)",color:C.gold,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>＋ Nouvelle mission</button>}
      {loading?<div style={{textAlign:"center",padding:40,color:C.txtD}}>Chargement...</div>
      :missions.length===0&&!showNew?<div style={{textAlign:"center",padding:"40px 20px",color:C.txtM}}><div style={{fontSize:40,marginBottom:10}}>📋</div>Aucune mission</div>
      :missions.map(m=>{const mc=m.msgCount||0;const tp=m.config?.type||"visite";const badge=tp==="hebdo"?"📊":"📋";
        return<div key={m.id} onClick={()=>onSelect(m.id)} style={{background:C.srfAlt,border:"1px solid "+C.brdG,borderRadius:14,padding:"14px 16px",marginBottom:10,cursor:"pointer",animation:"fadeUp .3s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:700,marginBottom:3}}>{badge+" "+( m.config?.title||"Sans titre")}</div><div style={{fontSize:11,color:C.txtD}}>{TEMPLATE_LABELS[tp]+(m.config?.location?" · 📍 "+m.config.location:"")+" · 💬 "+mc}</div></div><button onClick={ev=>del(m.id,ev)} style={{background:"none",border:"none",color:C.txtM,fontSize:16,cursor:"pointer",padding:"4px 8px"}}>🗑</button></div>
      </div>})}
    </div>
  </div>);
}

// ═══ Mission Chat ═══
function MissionChat({user,missionId,onBack}){
  const[view,setView]=useState("chat");const[msgs,setMsgs]=useState([]);const[rpt,setRpt]=useState({});
  const[cfg,setCfg]=useState({title:"",date:new Date().toISOString().slice(0,10),location:"",type:"visite"});
  const[inp,setInp]=useState("");const[busy,setBusy]=useState(false);const[showCfg,setShowCfg]=useState(false);
  const[online,setOnline]=useState(true);const[otherP,setOtherP]=useState(null);
  const endRef=useRef(null);const inpRef=useRef(null);const rptRef=useRef(rpt);const cfgRef=useRef(cfg);
  useEffect(()=>{rptRef.current=rpt},[rpt]);useEffect(()=>{cfgRef.current=cfg},[cfg]);

  const type=cfg.type||"visite";
  const sections=getSections(type);

  useEffect(()=>{setOnline(navigator.onLine);const on=()=>setOnline(true);const off=()=>setOnline(false);window.addEventListener("online",on);window.addEventListener("offline",off);return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off)}},[]);

  useEffect(()=>{
    const u1=dbOn("missions/"+missionId+"/config",d=>{if(d){setCfg(d);cfgRef.current=d}});
    const u2=dbOn("messages/"+missionId,d=>{if(!d){setMsgs([]);return}setMsgs(Object.values(d).sort((a,b)=>a.time-b.time))});
    const u3=dbOn("reports/"+missionId,d=>{if(d){setRpt(d);rptRef.current=d}});
    const ot=user.role==="A"?"B":"A";
    const u4=dbOn("presence/"+missionId+"/"+ot,d=>{setOtherP(d&&Date.now()-d.ts<15000?{online:true,name:d.name}:{online:false,name:d?.name})});
    const hb=setInterval(()=>{dbSet("presence/"+missionId+"/"+user.role,{name:user.name,ts:Date.now()})},5000);
    dbSet("presence/"+missionId+"/"+user.role,{name:user.name,ts:Date.now()});
    return()=>{u1();u2();u3();u4();clearInterval(hb)};
  },[missionId,user]);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},[msgs]);

  const delMsg=async id=>{if(!confirm("Supprimer ce message ?"))return;await dbDel("messages/"+missionId+"/"+id)};

  const handleSend=async()=>{
    if(!inp.trim()||busy)return;
    const text=inp.trim();setInp("");setBusy(true);
    const id=user.role+"-"+Date.now()+"-"+Math.random().toString(36).slice(2,6);
    const msg={id,text,sender:user.role,senderName:user.name,time:Date.now(),status:"processing",corrected:"",section:""};
    await dbSet("messages/"+missionId+"/"+id,msg);
    try{
      const secs=getSections(cfgRef.current.type||"visite");
      const ai=await callAI(text,rptRef.current,cfgRef.current,secs);
      if(ai){
        await dbSet("messages/"+missionId+"/"+id,{...msg,status:"done",corrected:ai.corrected,section:ai.section});
        const nr={...rptRef.current,[ai.section]:rptRef.current[ai.section]?rptRef.current[ai.section]+"\n"+ai.report_addition:ai.report_addition};
        await dbSet("reports/"+missionId,nr);
        await dbSet("missions/"+missionId+"/updatedAt",Date.now());
        await dbSet("missions/"+missionId+"/msgCount",(msgs.length+1));
      }
    }catch(e){console.error(e);await dbSet("messages/"+missionId+"/"+id,{...msg,status:"error"})}
    setBusy(false);
  };

  const saveSec=async(k,v)=>{const n={...rptRef.current,[k]:v};rptRef.current=n;await dbSet("reports/"+missionId,n)};
  const saveCfg=async nc=>{cfgRef.current=nc;await dbSet("missions/"+missionId+"/config",nc)};
  const filled=sections.filter(s=>rpt[s.key]);const prog=Math.round(filled.length/sections.length*100);
  const gL=k=>sections.find(s=>s.key===k)?.label||k;const gI=k=>sections.find(s=>s.key===k)?.icon||"📝";
  const sI=s=>s==="done"?<span style={{color:C.grn,fontSize:10}}>✓✓</span>:s==="processing"?<span style={{fontSize:10,animation:"pulse 1s infinite",color:C.gold}}>●</span>:<span style={{color:C.red,fontSize:10}}>⚠</span>;

  return(<div style={{width:"100%",maxWidth:480,margin:"0 auto",height:"100dvh",display:"flex",flexDirection:"column",background:C.bg,color:C.txt,overflow:"hidden"}}>
    <div style={{background:"linear-gradient(135deg,"+C.srf+",#0f1729)",borderBottom:"1px solid "+C.brdG,padding:"10px 12px 8px",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.04)",border:"1px solid "+C.brd,borderRadius:9,color:C.gold,width:34,height:34,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>←</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>{(type==="hebdo"?"📊":"📋")+" "+cfg.title}<div style={{width:7,height:7,borderRadius:"50%",background:online?C.grn:C.org,flexShrink:0}}/></div>
          <div style={{fontSize:10,color:C.txtD}}>{TEMPLATE_LABELS[type]+" · "+user.name+(otherP?.online?" · "+otherP.name:"")}</div>
        </div>
        <button onClick={()=>setShowCfg(!showCfg)} style={{background:showCfg?C.goldD:"rgba(255,255,255,0.03)",border:"1px solid "+C.brdG,borderRadius:9,color:C.gold,width:34,height:34,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>⚙</button>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}><div style={{flex:1,height:3,background:C.brd,borderRadius:2,overflow:"hidden"}}><div style={{width:prog+"%",height:"100%",borderRadius:2,background:"linear-gradient(90deg,"+C.gold+","+C.goldL+")",transition:"width 0.6s"}}/></div><span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:C.gold}}>{prog+"%"}</span></div>
    </div>
    {showCfg&&<div style={{background:C.srf,padding:"12px 14px 10px",borderBottom:"1px solid "+C.brd,animation:"slideDown .25s ease"}}>
      {[{l:"Titre",v:cfg.title,k:"title"},{l:"Lieu",v:cfg.location,k:"location"},{l:"Date",v:cfg.date,k:"date",t:"date"}].map((f,i)=><div key={i} style={{marginBottom:8}}><label style={{fontSize:9,fontWeight:600,color:C.txtD,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:3}}>{f.l}</label><input type={f.t||"text"} value={f.v} onChange={ev=>saveCfg({...cfg,[f.k]:ev.target.value})} style={{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.03)",border:"1px solid "+C.brdG,borderRadius:8,padding:"8px 11px",color:C.txt,fontSize:13,outline:"none"}}/></div>)}
    </div>}
    <div style={{display:"flex",background:"#0d1424",borderBottom:"1px solid "+C.brd,flexShrink:0}}>
      {[{k:"chat",lb:"Chat",ic:"💬",bd:msgs.length},{k:"report",lb:"Édition",ic:"✏️",bd:filled.length},{k:"preview",lb:"Aperçu",ic:"📄",bd:0}].map(t=><button key={t.k} onClick={()=>setView(t.k)} style={{flex:1,padding:"9px 0",background:"none",border:"none",borderBottom:view===t.k?"2px solid "+C.gold:"2px solid transparent",color:view===t.k?C.gold:C.txtM,fontSize:11,fontWeight:600,cursor:"pointer"}}>{t.ic+" "+t.lb+(t.bd>0?" "+t.bd:"")}</button>)}
    </div>
    <div style={{flex:1,overflow:"auto",background:view==="preview"?"#d0ccc4":"transparent"}}>
      {view==="chat"&&<div style={{padding:"10px 10px 4px"}}>
        {msgs.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:C.txtM}}><div style={{fontSize:36,marginBottom:8}}>💬</div><div style={{fontSize:13,fontWeight:600,color:C.txtD}}>{"Début — "+TEMPLATE_LABELS[type]}</div></div>}
        {msgs.map(m=>{const me=m.sender===user.role;const uc=UC[m.sender]||UC.A;return<div key={m.id} style={{marginBottom:9,animation:"fadeUp .3s ease"}}>
          {!me&&<div style={{fontSize:9.5,fontWeight:600,color:uc.ac,marginBottom:2,marginLeft:4}}>{m.senderName}</div>}
          <div style={{display:"flex",justifyContent:me?"flex-end":"flex-start"}}><div onTouchStart={e=>{e.currentTarget._lt=setTimeout(()=>{navigator.clipboard.writeText(m.text).then(()=>{const el=e.currentTarget;el.style.opacity="0.5";setTimeout(()=>el.style.opacity="1",300)});e.currentTarget._lt=null},1500)}} onTouchEnd={e=>{if(e.currentTarget._lt)clearTimeout(e.currentTarget._lt)}} onTouchMove={e=>{if(e.currentTarget._lt)clearTimeout(e.currentTarget._lt)}} style={{background:uc.bg,borderRadius:me?"12px 12px 3px 12px":"12px 12px 12px 3px",padding:"8px 11px",maxWidth:"80%",fontSize:12.5,lineHeight:1.5,userSelect:"none"}}>{m.text}{m.text}<div style={{fontSize:8.5,color:"rgba(255,255,255,0.2)",marginTop:2,textAlign:me?"right":"left",display:"flex",alignItems:"center",justifyContent:me?"flex-end":"flex-start",gap:3}}>{new Date(m.time).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}{me&&sI(m.status)}{me&&<span onClick={e=>{e.stopPropagation();delMsg(m.id)}} style={{marginLeft:4,cursor:"pointer",opacity:0.3,fontSize:10}}>🗑</span>}</div></div></div>
          {m.status==="done"&&<div style={{display:"flex",justifyContent:me?"flex-end":"flex-start",marginTop:3}}><div style={{background:"rgba(255,255,255,0.02)",border:"1px solid "+C.brdG,borderRadius:9,padding:"5px 9px",maxWidth:"85%",fontSize:11}}><div style={{color:"#b0a99e",lineHeight:1.4}}><span style={{color:C.gold,fontWeight:600}}>✓ </span>{m.corrected}</div><div style={{marginTop:3,display:"inline-flex",alignItems:"center",gap:3,background:C.goldD,borderRadius:6,padding:"1px 6px",fontSize:9.5,color:C.gold,fontWeight:500}}>{gI(m.section)+" "+gL(m.section)}</div></div></div>}
          {m.status==="processing"&&<div style={{display:"flex",justifyContent:me?"flex-end":"flex-start",marginTop:3}}><div style={{background:"rgba(255,255,255,0.02)",border:"1px solid "+C.brdG,borderRadius:9,padding:"4px 9px",fontSize:10.5,color:C.gold}}><span style={{animation:"pulse 1.2s infinite"}}>● </span>Analyse...</div></div>}
        </div>})}
        <div ref={endRef}/>
      </div>}
      {view==="report"&&<div style={{padding:10}}>
        <div style={{background:"linear-gradient(135deg,"+C.goldD+",rgba(212,164,74,0.02))",border:"1px solid "+C.brdG,borderRadius:12,padding:14,marginBottom:10}}><div style={{fontSize:16,fontWeight:700,fontFamily:"'Playfair Display',serif"}}>{cfg.title}</div><div style={{fontSize:11,color:C.txtD,marginTop:3}}>{"✏️ "+TEMPLATE_LABELS[type]+" — Cliquez pour modifier"}</div></div>
        {sections.map(s=><EditSec key={s.key} sec={s} content={rpt[s.key]||""} onSave={saveSec}/>)}
      </div>}
      {view==="preview"&&<WordPreview config={cfg} report={rpt} messages={msgs} type={type}/>}
    </div>
    {view==="chat"&&<div style={{flexShrink:0,background:C.srf,borderTop:"1px solid "+C.brd,padding:"9px 10px",paddingBottom:"max(9px, env(safe-area-inset-bottom))"}}>
      <div style={{display:"flex",gap:7,alignItems:"flex-end"}}>
        <textarea ref={inpRef} value={inp} onChange={ev=>setInp(ev.target.value)} onKeyDown={ev=>{if(ev.key==="Enter"&&!ev.shiftKey){ev.preventDefault();handleSend()}}} placeholder="Note de terrain..." rows={1} style={{flex:1,resize:"none",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:18,padding:"9px 14px",color:C.txt,fontSize:13,outline:"none",lineHeight:1.4,maxHeight:80,overflow:"auto"}} onInput={ev=>{ev.target.style.height="auto";ev.target.style.height=Math.min(ev.target.scrollHeight,80)+"px"}}/>
        <button onClick={handleSend} disabled={!inp.trim()||busy} style={{width:38,height:38,borderRadius:"50%",border:"none",flexShrink:0,background:inp.trim()&&!busy?"linear-gradient(135deg,"+C.gold+",#c4922e)":"rgba(255,255,255,0.03)",color:inp.trim()&&!busy?C.bg:C.txtM,fontSize:16,cursor:inp.trim()&&!busy?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center"}}>{busy?<span style={{fontSize:11,animation:"pulse 1s infinite"}}>⏳</span>:"↑"}</button>
      </div>
    </div>}
  </div>);
}

// ═══ Router ═══
function App(){
  const[user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem("ms-user"))}catch{return null}});
  const[screen,setScreen]=useState(user?"missions":"login");
  const[mid,setMid]=useState(null);
  const login=(n,r)=>{const u={name:n,role:r};setUser(u);localStorage.setItem("ms-user",JSON.stringify(u));setScreen("missions")};
  const logout=()=>{setUser(null);localStorage.removeItem("ms-user");setScreen("login")};
  const go=id=>{setMid(id);setScreen("chat")};
  const back=()=>{setMid(null);setScreen("missions")};
  if(screen==="login"||!user)return<Login onLogin={login}/>;
  if(screen==="missions")return<MissionsList user={user} onSelect={go} onLogout={logout}/>;
  if(screen==="chat"&&mid)return<MissionChat user={user} missionId={mid} onBack={back}/>;
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
